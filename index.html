<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulsar Pro | Strategic Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111; }
        .ikea-blue { background-color: #0058a3; }
        .ikea-text { color: #0058a3; }
        .border-soft { border-color: #f2f2f2; }
    </style>
</head>
<body class="p-6 md:p-16">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-16 border-b border-soft pb-10">
            <h1 class="text-2xl font-black tracking-tighter ikea-text uppercase italic">Pulsar <span class="text-gray-200 font-normal not-italic">Pro</span></h1>
            <span class="text-[9px] font-bold text-emerald-500 bg-emerald-50 px-2 py-1 uppercase tracking-widest">Multi-Source Active</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-16">
            <aside class="lg:col-span-1 space-y-10">
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Connection</label>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full p-4 border border-soft rounded-lg text-sm outline-none focus:border-blue-500">
                    <input id="g_key" type="password" placeholder="Groq Key" class="w-full p-4 border border-soft rounded-lg text-sm outline-none focus:border-blue-500">
                    <input id="s_id" type="text" placeholder="Search UID" class="w-full p-4 border border-soft rounded-lg text-sm outline-none focus:border-blue-500">
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Timeframe</label>
                    <select id="date_preset" onchange="toggleDate()" class="w-full p-4 bg-gray-50 border border-soft rounded-lg text-sm outline-none">
                        <option value="1">Yesterday</option>
                        <option value="7" selected>Last 7 Days</option>
                        <option value="qtd">Quarter to Date</option>
                        <option value="ytd">Year to Date</option>
                        <option value="custom">Custom...</option>
                    </select>
                    <div id="custom_ui" class="hidden space-y-2">
                        <input id="date_from" type="date" class="w-full p-3 border border-soft rounded-lg text-xs">
                        <input id="date_to" type="date" class="w-full p-3 border border-soft rounded-lg text-xs">
                    </div>
                </div>

                <button onclick="run()" id="btn" class="w-full py-5 ikea-blue text-white font-bold text-[10px] tracking-widest rounded-lg hover:opacity-90 uppercase transition-all">Generate Strategy</button>
            </aside>

            <main class="lg:col-span-3">
                <textarea id="prompt" rows="2" class="w-full text-4xl font-light border-none focus:ring-0 outline-none placeholder-gray-100 mb-10" placeholder="Analyze themes from all sources..."></textarea>

                <div id="sov_container" class="hidden mb-12">
                    <h4 class="text-[9px] font-bold text-gray-300 uppercase mb-4 tracking-widest">Share of Voice by Source</h4>
                    <div id="sov_bar" class="flex w-full h-8 rounded-lg overflow-hidden bg-gray-50"></div>
                </div>

                <div id="output" class="hidden space-y-20">
                    <div>
                        <h4 class="text-[9px] font-bold text-gray-300 uppercase mb-6 tracking-widest">Executive Summary</h4>
                        <p id="sum-text" class="text-2xl text-gray-800 font-light leading-snug italic"></p>
                    </div>
                    <div id="grid" class="grid grid-cols-1 gap-12"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        ['p_token', 'g_key', 's_id'].forEach(id => {
            const val = sessionStorage.getItem(id);
            if(val) document.getElementById(id).value = val;
            document.getElementById(id).addEventListener('input', e => sessionStorage.setItem(id, e.target.value));
        });

        function toggleDate() { document.getElementById('custom_ui').classList.toggle('hidden', document.getElementById('date_preset').value !== 'custom'); }

        async function run() {
            const btn = document.getElementById('btn');
            btn.disabled = true;

            const preset = document.getElementById('date_preset').value;
            let f = new Date(); let t = new Date();
            if(preset === '1') { f.setDate(f.getDate()-1); t.setDate(t.getDate()-1); }
            else if(preset === 'qtd') { f = new Date(f.getFullYear(), Math.floor(f.getMonth()/3)*3, 1); }
            else if(preset === 'ytd') { f = new Date(f.getFullYear(), 0, 1); }
            else if(preset !== 'custom') { f.setDate(f.getDate() - parseInt(preset)); }
            else { f = new Date(document.getElementById('date_from').value); t = new Date(document.getElementById('date_to').value); }

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        pulsar_token: document.getElementById('p_token').value,
                        groq_key: document.getElementById('g_key').value,
                        search_id: document.getElementById('s_id').value,
                        date_from: f.toISOString().split('T')[0],
                        date_to: t.toISOString().split('T')[0],
                        prompt: document.getElementById('prompt').value || "General Strategy"
                    })
                });

                const data = await res.json();
                if(data.error) throw new Error(data.error);

                // Render SOV
                const sovBar = document.getElementById('sov_bar');
                sovBar.innerHTML = "";
                const colors = ['#0058a3', '#007cc3', '#409ad0', '#80bce0'];
                Object.entries(data.sov).forEach(([name, val], i) => {
                    const seg = document.createElement('div');
                    seg.style.width = val + '%';
                    seg.style.backgroundColor = colors[i % colors.length];
                    seg.className = "flex items-center justify-center text-[8px] font-bold text-white uppercase";
                    seg.innerHTML = `<span>${name}</span>`;
                    sovBar.appendChild(seg);
                });
                document.getElementById('sov_container').classList.remove('hidden');

                // Render Summary & Themes
                document.getElementById('sum-text').innerText = data.executive_summary;
                const grid = document.getElementById('grid');
                grid.innerHTML = "";
                data.themes.forEach(theme => {
                    const card = document.createElement('div');
                    card.className = "border-l-2 border-gray-100 pl-8 py-2";
                    card.innerHTML = `
                        <h5 class="text-xl font-bold mb-4">${theme.title}</h5>
                        <p class="text-gray-500 font-light mb-8 max-w-3xl">${theme.summary}</p>
                        <div class="grid grid-cols-2 gap-8 bg-gray-50 p-6 rounded-lg">
                            <div><span class="text-[8px] font-bold text-emerald-600 uppercase block mb-2">Offensive</span><p class="text-[11px] italic">${theme.offensive_play}</p></div>
                            <div><span class="text-[8px] font-bold text-rose-600 uppercase block mb-2">Defensive</span><p class="text-[11px] italic">${theme.defensive_play}</p></div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                document.getElementById('output').classList.remove('hidden');
            } catch (e) { alert(e.message); }
            finally { btn.disabled = false; }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intelligence Engine | Gemini MCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');
        body { background: #08080a; color: #d1d5db; font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .terminal-text { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter neon-blue">INTEL.CORE <span class="text-gray-600 font-light">v4.0</span></h1>
                <p class="text-[9px] uppercase tracking-[0.4em] text-gray-500">Autonomous Data Ingestion Layer</p>
            </div>
            <div id="status-tag" class="text-[9px] border border-gray-800 px-3 py-1 rounded-full text-gray-600 font-bold uppercase tracking-widest">System Standby</div>
        </header>

        <div class="glass p-8 rounded-3xl mb-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-end">
                <div class="space-y-3">
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest px-1">Keys</label>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full bg-[#0d0d0f] border border-gray-800 p-3 rounded-xl text-xs outline-none focus:border-blue-500 transition-all">
                    <input id="g_key" type="password" placeholder="Groq API Key" class="w-full bg-[#0d0d0f] border border-gray-800 p-3 rounded-xl text-xs outline-none focus:border-blue-500 transition-all">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest px-1">Parameters</label>
                    <input id="s_id" type="text" placeholder="Search ID" class="w-full bg-[#0d0d0f] border border-gray-800 p-3 rounded-xl text-xs outline-none focus:border-blue-500 transition-all">
                    <select id="date_range" onchange="toggleDate()" class="w-full bg-[#0d0d0f] border border-gray-800 p-3 rounded-xl text-xs text-gray-400 outline-none">
                        <option value="today">Today</option>
                        <option value="7" selected>Last 7 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="ytd">YTD</option>
                        <option value="custom">Custom Range...</option>
                    </select>
                </div>
                <div id="custom_picker" class="hidden space-y-3">
                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest px-1">Dates</label>
                    <input type="date" id="start_date" class="w-full bg-[#0d0d0f] border border-gray-800 p-3 text-xs rounded-xl">
                    <input type="date" id="end_date" class="w-full bg-[#0d0d0f] border border-gray-800 p-3 text-xs rounded-xl">
                </div>
                <div class="lg:col-span-1">
                    <button onclick="runIngest()" id="btn-main" class="w-full h-[105px] bg-blue-600 hover:bg-blue-500 text-white rounded-2xl flex flex-col items-center justify-center gap-2 transition-all shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                        <span class="font-bold text-[11px] uppercase tracking-widest">Initialize Node</span>
                        <span class="text-[9px] opacity-60">Deep Ingestion Active</span>
                    </button>
                </div>
            </div>

            <div id="status-bar" class="hidden mt-10 pt-10 border-t border-gray-800 space-y-4">
                <div class="flex justify-between text-[10px] font-bold text-blue-400 terminal-text">
                    <span id="status-msg">CRAWLING PULSAR API...</span>
                    <span id="prog-val">0%</span>
                </div>
                <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden">
                    <div id="prog-bar" class="bg-blue-600 h-full transition-all duration-700 shadow-[0_0_10px_rgba(59,130,246,1)]" style="width:0%"></div>
                </div>
                <div id="console" class="bg-black/40 p-5 text-[10px] text-emerald-500 h-24 overflow-y-auto rounded-xl terminal-text border border-gray-900"></div>
            </div>
        </div>

        <div id="chat-box" class="hidden opacity-0 transition-all duration-1000 space-y-6 pb-20">
            <div id="history" class="space-y-8 min-h-[300px]"></div>
            <div class="relative glass rounded-3xl p-2 flex items-center">
                <input id="query" type="text" placeholder="Ask anything about the ingested emotions or topics..." class="flex-1 bg-transparent p-6 text-xl font-light outline-none text-white">
                <button onclick="ask()" class="bg-blue-600 p-5 rounded-2xl hover:bg-blue-500 transition-all mr-2">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Persistence & Date Toggle
        ['p_token', 'g_key', 's_id'].forEach(id => {
            const v = sessionStorage.getItem(id);
            if(v) document.getElementById(id).value = v;
            document.getElementById(id).oninput = e => sessionStorage.setItem(id, e.target.value);
        });

        function toggleDate() {
            const val = document.getElementById('date_range').value;
            document.getElementById('custom_picker').classList.toggle('hidden', val !== 'custom');
        }

        function calculateDates() {
            const range = document.getElementById('date_range').value;
            let f = new Date(); let t = new Date();
            if (range === 'custom') return { from: new Date(document.getElementById('start_date').value).toISOString(), to: new Date(document.getElementById('end_date').value).toISOString() };
            if (range === 'ytd') f = new Date(new Date().getFullYear(), 0, 1);
            else if (range !== 'today') f.setDate(f.getDate() - parseInt(range));
            else f.setHours(0,0,0,0);
            return { from: f.toISOString(), to: t.toISOString() };
        }

        async function runIngest() {
            const dates = calculateDates();
            const btn = document.getElementById('btn-main');
            const con = document.getElementById('console');
            const bar = document.getElementById('prog-bar');
            const val = document.getElementById('prog-val');
            const tag = document.getElementById('status-tag');
            
            document.getElementById('status-bar').classList.remove('hidden');
            btn.disabled = true; btn.classList.add('opacity-50');
            tag.innerText = "Indexing Corpus"; tag.classList.add('text-blue-500', 'border-blue-500');

            try {
                const response = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        pulsar_token: document.getElementById('p_token').value,
                        search_id: document.getElementById('s_id').value,
                        ...dates
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    decoder.decode(value).split('\n\n').forEach(line => {
                        if (line.startsWith('data: ')) {
                            const d = JSON.parse(line.replace('data: ', ''));
                            if (d.status === 'ingesting') {
                                con.innerHTML += `> PACKET_RECEIVED: ${d.count} DATAPOINTS INDEXED...<br>`;
                                bar.style.width = d.progress + '%';
                                val.innerText = d.progress + '%';
                                con.scrollTop = con.scrollHeight;
                            } else if (d.status === 'complete') {
                                con.innerHTML += `<span class="text-white">*** NODE SYNCHRONIZED: ${d.total} ENTRIES LOADED ***</span>`;
                                document.getElementById('chat-box').classList.remove('hidden');
                                setTimeout(() => document.getElementById('chat-box').classList.add('opacity-100'), 100);
                                tag.innerText = "Online - Ready for Query";
                            }
                        }
                    });
                }
            } catch (e) { con.innerHTML += `<span class="text-red-500">> ERR_FATAL: ${e.message}</span>`; }
        }

        async function ask() {
            const q = document.getElementById('query').value;
            const hist = document.getElementById('history');
            if(!q) return;

            const u = document.createElement('div');
            u.className = "ml-auto max-w-xl glass p-6 rounded-3xl rounded-tr-none mb-6 animate-pulse";
            u.innerHTML = `<p class="text-[9px] font-bold text-gray-500 uppercase mb-2">Primary Query</p><p class="text-xl text-white font-light">${q}</p>`;
            hist.appendChild(u);
            document.getElementById('query').value = "";

            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    search_id: document.getElementById('s_id').value,
                    groq_key: document.getElementById('g_key').value,
                    question: q
                })
            });
            const data = await res.json();
            u.classList.remove('animate-pulse');

            const a = document.createElement('div');
            a.className = "mr-auto max-w-2xl bg-white/5 border border-white/10 p-8 rounded-3xl rounded-tl-none mb-6";
            a.innerHTML = `<p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-4 flex items-center gap-2"><span class="h-1.5 w-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></span> Neural Synthesis</p>
                           <div class="text-gray-300 leading-relaxed font-light text-lg">${data.answer.replace(/\n/g, '<br>')}</div>`;
            hist.appendChild(a);
            hist.scrollTop = hist.scrollHeight;
        }
    </script>
</body>
</html>

<div id="sov_container" class="hidden mb-20 space-y-8 animate-fadeIn">
    <div>
        <h4 class="text-[9px] font-black text-gray-300 uppercase mb-4 tracking-widest">Global Brand Share (SOV)</h4>
        <div id="brand_bar" class="flex w-full h-12 rounded-2xl overflow-hidden bg-gray-50 shadow-inner"></div>
    </div>
    
    <div id="source_breakdown_grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>
</div>

<script>
// Inside your run() function after getting the 'data' response:

// 1. Render Main Brand SOV Bar
const brandBar = document.getElementById('brand_bar');
const sourceGrid = document.getElementById('source_breakdown_grid');
brandBar.innerHTML = "";
sourceGrid.innerHTML = "";

const totalPosts = Object.values(data.brand_sov).reduce((a, b) => a + b.count, 0);
const colors = ['#0058a3', '#ffcc00', '#111111', '#777777']; // Professional Competitor Palette

Object.entries(data.brand_sov).forEach(([brand, info], i) => {
    const percent = Math.round((info.count / totalPosts) * 100);
    
    // Create Main Bar Segment
    const seg = document.createElement('div');
    seg.style.width = percent + '%';
    seg.style.backgroundColor = colors[i % colors.length];
    seg.className = "flex items-center justify-center text-[10px] font-black text-white uppercase px-4 cursor-default transition-all hover:opacity-90";
    seg.innerHTML = `<span>${brand} ${percent}%</span>`;
    brandBar.appendChild(seg);

    // Create Detailed Source Card for this Brand
    const card = document.createElement('div');
    card.className = "bg-gray-50 p-6 rounded-2xl border border-gray-100 shadow-sm";
    
    let sourceHtml = `<h6 class="text-[10px] font-black mb-4 uppercase tracking-widest" style="color:${colors[i%colors.length]}">${brand} Channels</h6>`;
    
    Object.entries(info.sources).forEach(([src, count]) => {
        const srcPct = Math.round((count / info.count) * 100);
        sourceHtml += `
            <div class="mb-3">
                <div class="flex justify-between text-[9px] font-bold text-gray-500 uppercase mb-1">
                    <span>${src}</span><span>${srcPct}%</span>
                </div>
                <div class="w-full bg-gray-200 h-1 rounded-full">
                    <div class="h-1 rounded-full" style="width:${srcPct}%; background-color:${colors[i%colors.length]}"></div>
                </div>
            </div>`;
    });
    card.innerHTML = sourceHtml;
    sourceGrid.appendChild(card);
});

document.getElementById('sov_container').classList.remove('hidden');
</script>

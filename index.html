<script>
async function ask() {
    const q = document.getElementById('query').value;
    const history = document.getElementById('history');
    
    // User bubble
    const userMsg = document.createElement('div');
    userMsg.className = "ml-auto max-w-[80%] bg-blue-600 p-4 rounded-2xl rounded-tr-none mb-6";
    userMsg.innerHTML = `<p class="text-sm text-white">${q}</p>`;
    history.appendChild(userMsg);

    const res = await fetch('/api/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            search_id: document.getElementById('s_id').value,
            groq_key: document.getElementById('g_key').value,
            question: q
        })
    });
    const data = await res.json();
    
    // AI response with "Insight Card" styling
    const aiMsg = document.createElement('div');
    aiMsg.className = "mr-auto max-w-[90%] bg-[#111] border border-gray-800 p-6 rounded-2xl rounded-tl-none mb-6 shadow-2xl";
    aiMsg.innerHTML = `
        <div class="flex items-center gap-2 mb-4">
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest">Intelligence Synthesis</span>
        </div>
        <div class="text-gray-300 font-light leading-relaxed prose prose-invert">
            ${data.answer.replace(/\n/g, '<br>')}
        </div>
    `;
    history.appendChild(aiMsg);
    history.scrollTop = history.scrollHeight;
    document.getElementById('query').value = "";
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 uppercase tracking-tighter">InsightFlow Pro</h1>
            <p class="text-slate-500 mt-2">Pulsar TRAC Data Processor & Boolean Generator</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6 bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">API Authentication</label>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full mb-2 p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-blue-500 outline-none">
                    <input id="g_key" type="password" placeholder="Groq Key" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-blue-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Search Config</label>
                    <input id="s_id" type="text" placeholder="Search ID" class="w-full mb-4 p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none">
                    
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Timeframe</label>
                    <select id="date_preset" onchange="toggleDateVisibility()" class="w-full mb-3 p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none text-slate-300">
                        <option value="today">Today</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="7">Last 7 Days</option>
                        <option value="14">Last 14 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="this_month">This Month</option>
                        <option value="custom">Custom Range...</option>
                    </select>

                    <div id="custom_date_container" class="hidden flex gap-2 text-xs">
                        <input id="date_from" type="date" class="w-1/2 p-2 rounded-lg bg-slate-900 border border-slate-700 text-slate-300">
                        <input id="date_to" type="date" class="w-1/2 p-2 rounded-lg bg-slate-900 border border-slate-700 text-slate-300">
                    </div>
                </div>

                <button onclick="run()" id="btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/20">🚀 ANALYZE DATA</button>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 text-center">Custom Analysis Goal</label>
                    <textarea id="prompt" rows="3" class="w-full bg-transparent text-xl text-center focus:outline-none placeholder-slate-600 italic" 
                        placeholder="Click to type... e.g. What are the top 3 pain points?" onfocus="this.placeholder=''"></textarea>
                </div>

                <div id="output" class="hidden space-y-6">
                    <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-3xl">
                        <h3 class="text-blue-400 font-bold text-sm mb-2 uppercase">Executive Summary</h3>
                        <p id="sum-text" class="text-slate-300 leading-relaxed"></p>
                    </div>
                    <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
                
                <div id="loader" class="hidden text-center py-20">
                    <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-slate-500 animate-pulse font-mono text-xs uppercase tracking-widest">Processing Pulsar Data & Generating Booleans</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDateVisibility() {
            const preset = document.getElementById('date_preset').value;
            const container = document.getElementById('custom_date_container');
            container.classList.toggle('hidden', preset !== 'custom');
        }

        function getDateRange() {
            const preset = document.getElementById('date_preset').value;
            let from = new Date();
            let to = new Date();

            if (preset === 'today') {
                from.setHours(0,0,0,0);
            } else if (preset === 'yesterday') {
                from.setDate(from.getDate() - 1);
                from.setHours(0,0,0,0);
                to.setDate(to.getDate() - 1);
                to.setHours(23,59,59,999);
            } else if (['7', '14', '30'].includes(preset)) {
                from.setDate(from.getDate() - parseInt(preset));
            } else if (preset === 'this_month') {
                from = new Date(from.getFullYear(), from.getMonth(), 1);
            } else if (preset === 'custom') {
                return { 
                    from: document.getElementById('date_from').value, 
                    to: document.getElementById('date_to').value 
                };
            }

            return { 
                from: from.toISOString().split('T')[0], 
                to: to.toISOString().split('T')[0] 
            };
        }

        async function run() {
            const btn = document.getElementById('btn');
            const out = document.getElementById('output');
            const loader = document.getElementById('loader');
            const grid = document.getElementById('category-grid');
            const range = getDateRange();

            if(!range.from || !range.to) { alert("Please select a valid date range."); return; }

            btn.disabled = true;
            loader.classList.remove('hidden');
            out.classList.add('hidden');
            grid.innerHTML = "";

            const payload = {
                pulsar_token: document.getElementById('p_token').value,
                groq_key: document.getElementById('g_key').value,
                search_id: document.getElementById('s_id').value,
                date_from: range.from,
                date_to: range.to,
                prompt: document.getElementById('prompt').value || "Analyze brand themes"
            };

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('sum-text').innerText = data.summary;
                data.categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 p-5 rounded-2xl border border-slate-700 hover:border-blue-500 transition-all";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <span class="font-bold text-slate-100">${cat.name}</span>
                            <span class="bg-blue-900/50 text-blue-300 text-[10px] px-2 py-1 rounded-md font-mono border border-blue-500/20">${cat.count} Mentions</span>
                        </div>
                        <div class="relative group">
                            <code class="block text-[10px] bg-slate-900 p-3 rounded-lg text-emerald-400 border border-slate-800 break-all leading-tight font-mono">${cat.boolean}</code>
                            <button onclick="navigator.clipboard.writeText('${cat.boolean}')" class="absolute top-2 right-2 text-[9px] bg-slate-700 hover:bg-blue-600 px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">Copy</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                out.classList.remove('hidden');
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

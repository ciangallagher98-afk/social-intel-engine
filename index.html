<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pulsar Pro | Temporal Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111; }
        .ikea-blue { background-color: #0058a3; }
        .ikea-text { color: #0058a3; }
        .border-soft { border-color: #efefef; }
    </style>
</head>
<body class="p-8 md:p-20">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-baseline mb-20 border-b border-soft pb-10">
            <h1 class="text-3xl font-black tracking-tighter ikea-text uppercase italic">Pulsar <span class="text-gray-200 font-normal not-italic">Pro</span></h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.4em]">Time-Series Analysis Active</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-20">
            <aside class="lg:col-span-1 space-y-12">
                <div class="space-y-6">
                    <h3 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Connection</h3>
                    <div class="space-y-3">
                        <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full p-4 bg-white border border-soft rounded-none text-sm outline-none focus:border-blue-500 transition-all">
                        <input id="g_key" type="password" placeholder="Groq Key" class="w-full p-4 bg-white border border-soft rounded-none text-sm outline-none focus:border-blue-500 transition-all">
                        <input id="s_id" type="text" placeholder="Search UID" class="w-full p-4 bg-white border border-soft rounded-none text-sm outline-none focus:border-blue-500 transition-all">
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Window</h3>
                    <select id="date_preset" onchange="toggleDate()" class="w-full p-4 bg-white border border-soft rounded-none text-sm outline-none">
                        <option value="7">Past Week</option>
                        <option value="30">Past Month</option>
                        <option value="custom">Manual Range...</option>
                    </select>
                    <div id="custom_ui" class="hidden space-y-2">
                        <input id="date_from" type="date" class="w-full p-3 border border-soft text-xs">
                        <input id="date_to" type="date" class="w-full p-3 border border-soft text-xs">
                    </div>
                </div>

                <button onclick="run()" id="btn" class="w-full py-5 ikea-blue text-white font-bold text-xs tracking-[0.2em] hover:opacity-90 transition-all">GENERATE INSIGHTS</button>
            </aside>

            <main class="lg:col-span-3">
                <div class="mb-16">
                    <textarea id="prompt" rows="2" class="w-full text-4xl font-light border-none focus:ring-0 outline-none placeholder-gray-100" placeholder="e.g. Why did mentions spike on Tuesday?"></textarea>
                </div>

                <div id="prog_wrap" class="hidden mb-16">
                    <div class="flex justify-between items-end mb-4">
                        <span id="prog_msg" class="text-[10px] font-bold ikea-text uppercase tracking-widest">Analyzing Timeline</span>
                        <span id="prog_val" class="text-2xl font-light ikea-text">0%</span>
                    </div>
                    <div class="w-full bg-gray-50 h-[1px]"><div id="prog_bar" class="ikea-blue h-[1px] transition-all duration-1000 ease-in-out" style="width:0%"></div></div>
                </div>

                <div id="output" class="hidden space-y-20">
                    <div class="max-w-2xl">
                        <h4 class="text-[10px] font-bold text-gray-300 uppercase mb-6 tracking-widest">Executive Intelligence Report</h4>
                        <p id="sum-text" class="text-2xl text-gray-800 font-light leading-snug italic"></p>
                    </div>
                    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-16"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Key Persistence
        ['p_token', 'g_key', 's_id'].forEach(id => {
            const val = sessionStorage.getItem(id);
            if(val) document.getElementById(id).value = val;
            document.getElementById(id).addEventListener('input', e => sessionStorage.setItem(id, e.target.value));
        });

        function toggleDate() { document.getElementById('custom_ui').classList.toggle('hidden', document.getElementById('date_preset').value !== 'custom'); }

        async function updateProgress(val, msg) {
            document.getElementById('prog_bar').style.width = val + '%';
            document.getElementById('prog_val').innerText = val + '%';
            document.getElementById('prog_msg').innerText = msg;
        }

        async function run() {
            const btn = document.getElementById('btn');
            const wrap = document.getElementById('prog_wrap');
            const grid = document.getElementById('grid');
            const out = document.getElementById('output');
            
            btn.disabled = true; wrap.classList.remove('hidden'); out.classList.add('hidden');
            grid.innerHTML = "";

            await updateProgress(20, "Scanning Pulsar Database");

            // Date Calculation
            const preset = document.getElementById('date_preset').value;
            let f = new Date(); let t = new Date();
            if(preset !== 'custom') f.setDate(f.getDate() - parseInt(preset));
            else { f = new Date(document.getElementById('date_from').value); t = new Date(document.getElementById('date_to').value); }

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        pulsar_token: document.getElementById('p_token').value,
                        groq_key: document.getElementById('g_key').value,
                        search_id: document.getElementById('s_id').value,
                        date_from: f.toISOString().split('T')[0],
                        date_to: t.toISOString().split('T')[0],
                        prompt: document.getElementById('prompt').value || "Analyze trends and anomalies"
                    })
                });

                await updateProgress(70, "Mapping Narrative Events");
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                await updateProgress(100, "Report Compiled");
                document.getElementById('sum-text').innerText = data.summary;

                data.categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = "border-t border-gray-100 pt-8 group";
                    card.innerHTML = `
                        <div class="flex justify-between items-baseline mb-6">
                            <h5 class="text-sm font-bold uppercase tracking-tight">${cat.name}</h5>
                            <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1">IMPACT ${cat.impact}</span>
                        </div>
                        <div class="flex gap-4 text-[9px] font-bold text-gray-300 uppercase tracking-widest mb-6">
                            <span class="text-gray-900">${cat.sentiment}</span>
                            <span>${cat.emotion}</span>
                            <span>${cat.count} Mentions</span>
                        </div>
                        <p class="text-[10px] text-gray-400 font-mono mb-6 truncate bg-gray-50 p-3 rounded group-hover:bg-blue-50 transition-colors">${cat.boolean}</p>
                        <div class="flex justify-between items-center">
                            <a href="${cat.url}" target="_blank" class="text-[10px] font-bold ikea-text border-b border-blue-500 pb-1 uppercase">Source Link</a>
                            <button onclick="navigator.clipboard.writeText('${cat.boolean}')" class="text-[9px] font-bold text-gray-200 hover:text-blue-500 uppercase transition-colors">Copy Logic</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                setTimeout(() => { wrap.classList.add('hidden'); out.classList.remove('hidden'); }, 800);
            } catch (e) {
                alert(e.message);
                wrap.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

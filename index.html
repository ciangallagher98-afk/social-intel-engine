<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-12">
    <input id="p_token" type="password" placeholder="Pulsar Token" class="bg-black border border-gray-800 p-4 rounded-xl text-xs outline-none focus:border-blue-600">
    <input id="g_key" type="password" placeholder="Groq API Key" class="bg-black border border-gray-800 p-4 rounded-xl text-xs outline-none focus:border-blue-600">
    <input id="s_id" type="text" placeholder="Search ID" class="bg-black border border-gray-800 p-4 rounded-xl text-xs outline-none focus:border-blue-600">
    
    <div class="flex flex-col gap-2">
        <select id="date_range" onchange="toggleCustomDate()" class="bg-black border border-gray-800 p-4 rounded-xl text-xs text-gray-400 outline-none focus:border-blue-600">
            <option value="today">Today</option>
            <option value="yesterday">Yesterday</option>
            <option value="7">Last 7 Days</option>
            <option value="14">Last 14 Days</option>
            <option value="30">Last 30 Days</option>
            <option value="ytd">Year to Date (YTD)</option>
            <option value="custom">Custom Range...</option>
        </select>
        <div id="custom_picker" class="hidden flex gap-2">
            <input type="date" id="start_date" class="bg-black border border-gray-800 p-2 text-[10px] rounded-lg flex-1">
            <input type="date" id="end_date" class="bg-black border border-gray-800 p-2 text-[10px] rounded-lg flex-1">
        </div>
    </div>
</div>

<script>
function toggleCustomDate() {
    const val = document.getElementById('date_range').value;
    document.getElementById('custom_picker').classList.toggle('hidden', val !== 'custom');
}

function calculateDates() {
    const range = document.getElementById('date_range').value;
    let from = new Date();
    let to = new Date();

    if (range === 'custom') {
        return { 
            from: new Date(document.getElementById('start_date').value).toISOString(), 
            to: new Date(document.getElementById('end_date').value).toISOString() 
        };
    }
    
    if (range === 'today') from.setHours(0,0,0,0);
    else if (range === 'yesterday') {
        from.setDate(from.getDate() - 1); from.setHours(0,0,0,0);
        to.setDate(to.getDate() - 1); to.setHours(23,59,59,999);
    }
    else if (range === 'ytd') from = new Date(new Date().getFullYear(), 0, 1);
    else from.setDate(from.getDate() - parseInt(range));

    return { from: from.toISOString(), to: to.toISOString() };
}

// In your runIngest() function, update the fetch body:
// body: JSON.stringify({
//    ...calculateDates(),
//    pulsar_token: ..., search_id: ...
// })
</script>

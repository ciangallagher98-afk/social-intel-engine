<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 italic uppercase">InsightFlow Pro</h1>
            <p class="text-slate-500 mt-2">Pulsar TRAC Intelligence & Impact Analytics</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6 bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Credentials</label>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-blue-500 outline-none">
                    <input id="g_key" type="password" placeholder="Groq Key" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-3">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Search Configuration</label>
                    <input id="s_id" type="text" placeholder="Search ID" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none">
                    <select id="date_preset" onchange="toggleDateVisibility()" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none text-slate-300">
                        <option value="today">Today</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="7" selected>Last 7 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="custom">Custom Range...</option>
                    </select>
                    <div id="custom_date_container" class="hidden flex gap-2">
                        <input id="date_from" type="date" class="w-1/2 p-2 rounded-lg bg-slate-900 border border-slate-700 text-xs">
                        <input id="date_to" type="date" class="w-1/2 p-2 rounded-lg bg-slate-900 border border-slate-700 text-xs">
                    </div>
                </div>
                <button onclick="run()" id="btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/20">🚀 ANALYZE DATA</button>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <textarea id="prompt" rows="2" class="w-full bg-transparent text-xl text-center focus:outline-none placeholder-slate-600 italic" placeholder="Describe your goal... (e.g. Top 3 pain points)" onfocus="this.placeholder=''"></textarea>
                </div>

                <div id="loader" class="hidden text-center py-20">
                    <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-slate-500 animate-pulse text-xs uppercase tracking-widest font-mono">Gathering Evidence & Impact Data</p>
                </div>

                <div id="output" class="hidden space-y-6">
                    <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-3xl">
                        <h3 class="text-blue-400 font-bold text-xs mb-2 uppercase">Executive Summary</h3>
                        <p id="sum-text" class="text-slate-300 text-sm leading-relaxed italic"></p>
                    </div>
                    <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDateVisibility() {
            document.getElementById('custom_date_container').classList.toggle('hidden', document.getElementById('date_preset').value !== 'custom');
        }

        function calculateDates() {
            const preset = document.getElementById('date_preset').value;
            let from = new Date();
            let to = new Date();
            if (preset === 'today') { from.setHours(0,0,0,0); }
            else if (preset === 'yesterday') { from.setDate(from.getDate()-1); from.setHours(0,0,0,0); to.setDate(to.getDate()-1); to.setHours(23,59,59); }
            else if (['7', '30'].includes(preset)) { from.setDate(from.getDate() - parseInt(preset)); }
            else if (preset === 'custom') { return { f: document.getElementById('date_from').value, t: document.getElementById('date_to').value }; }
            return { f: from.toISOString().split('T')[0], t: to.toISOString().split('T')[0] };
        }

        async function run() {
            const btn = document.getElementById('btn');
            const out = document.getElementById('output');
            const loader = document.getElementById('loader');
            const grid = document.getElementById('category-grid');
            const dates = calculateDates();

            btn.disabled = true;
            loader.classList.remove('hidden');
            out.classList.add('hidden');
            grid.innerHTML = "";

            const payload = {
                pulsar_token: document.getElementById('p_token').value,
                groq_key: document.getElementById('g_key').value,
                search_id: document.getElementById('s_id').value,
                date_from: dates.f,
                date_to: dates.t,
                prompt: document.getElementById('prompt').value || "Analyze key brand themes"
            };

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                document.getElementById('sum-text').innerText = data.summary || "No summary provided.";
                
                // SAFETY CHECK: Prevent the .forEach error
                const categories = data.categories || [];
                
                categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 p-5 rounded-2xl border border-slate-700 flex flex-col justify-between hover:border-blue-500 transition-all";
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="font-bold text-blue-400 text-sm">${cat.name}</span>
                                <span class="text-[9px] px-2 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-bold uppercase">Impact: ${cat.impact_score || 0}</span>
                            </div>
                            <p class="text-[10px] text-slate-500 mb-3 font-mono uppercase font-bold">${cat.count || 0} Mentions Identified</p>
                            <code class="block text-[9px] bg-slate-900 p-2 rounded mb-4 text-slate-400 break-all border border-slate-700 font-mono">${cat.boolean || ""}</code>
                        </div>
                        <div class="pt-4 border-t border-slate-700 flex justify-between items-center">
                            <a href="${cat.evidence}" target="_blank" class="text-[10px] text-blue-400 font-bold hover:underline">🔗 View Evidence</a>
                            <button onclick="navigator.clipboard.writeText('${cat.boolean}')" class="text-[9px] bg-slate-700 px-3 py-1 rounded-lg hover:bg-slate-600 transition-colors uppercase font-bold">Copy Boolean</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                out.classList.remove('hidden');
            } catch (e) {
                alert(e.message);
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intelligence Terminal | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Space+Grotesk:wght@300;700&display=swap');
        body { background: #050507; color: #a1a1aa; font-family: 'Space Grotesk', sans-serif; }
        .terminal { font-family: 'JetBrains Mono', monospace; background: #000; border: 1px solid #1a1a1c; }
        .input-dark { background: #0a0a0c; border: 1px solid #1a1a1c; color: white; transition: all 0.2s; }
        .input-dark:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 15px rgba(59,130,246,0.1); }
    </style>
</head>
<body class="p-6 lg:p-12 min-h-screen">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-white italic">INTEL<span class="text-blue-500">.MCP</span></h1>
                <p class="text-[10px] uppercase tracking-[0.3em] text-gray-600 mt-1">Deep Narrative Ingestion</p>
            </div>
            <div id="connection-status" class="text-[9px] font-bold text-gray-700 uppercase tracking-widest border border-gray-900 px-3 py-1 rounded-full">System Idle</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="space-y-4">
                <input id="p_token" type="password" placeholder="Pulsar Token" class="input-dark w-full p-4 rounded-xl text-xs">
                <input id="g_key" type="password" placeholder="Groq API Key" class="input-dark w-full p-4 rounded-xl text-xs">
            </div>
            <div class="space-y-4">
                <input id="s_id" type="text" placeholder="Search ID" class="input-dark w-full p-4 rounded-xl text-xs">
                <select id="date_range" onchange="toggleDate()" class="input-dark w-full p-4 rounded-xl text-xs">
                    <option value="7" selected>Last 7 Days</option>
                    <option value="30">Last 30 Days</option>
                    <option value="ytd">YTD</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>
            <div id="btn-container" class="relative">
                <button onclick="runIngest()" id="btn-main" class="w-full h-full bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all flex flex-col items-center justify-center p-6">
                    <span class="text-[10px] uppercase tracking-widest mb-1">Initialize Ingest</span>
                    <span id="btn-subtext" class="text-[8px] opacity-60">Wait time: ~15 mins</span>
                </button>
            </div>
        </div>

        <div id="custom_picker" class="hidden grid grid-cols-2 gap-4 mb-8 animate-slideDown">
            <input type="date" id="start_date" class="input-dark p-4 rounded-xl text-xs">
            <input type="date" id="end_date" class="input-dark p-4 rounded-xl text-xs">
        </div>

        <div id="status-panel" class="hidden space-y-4 mb-12">
            <div class="flex justify-between text-[10px] font-bold terminal-text">
                <span class="text-blue-400">STATUS: <span id="current-op">LISTENING</span></span>
                <span id="prog-val" class="text-white">0%</span>
            </div>
            <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden">
                <div id="prog-bar" class="bg-blue-600 h-full transition-all duration-500" style="width:0%"></div>
            </div>
            <div id="console" class="terminal p-5 text-[10px] text-emerald-500 h-40 overflow-y-auto rounded-xl"></div>
        </div>

        <div id="chat-section" class="hidden opacity-0 transition-all duration-1000">
             <div id="history" class="space-y-6 mb-12"></div>
             <div class="relative">
                 <input id="query" type="text" placeholder="Ask about sentiment, topics, or emotions..." class="w-full bg-transparent border-b border-gray-800 p-6 text-2xl font-light outline-none text-white focus:border-blue-500">
             </div>
        </div>
    </div>

    <script>
        function toggleDate() {
            const isCustom = document.getElementById('date_range').value === 'custom';
            document.getElementById('custom_picker').classList.toggle('hidden', !isCustom);
        }

        async function runIngest() {
            const btn = document.getElementById('btn-main');
            const consoleBox = document.getElementById('console');
            const statusPanel = document.getElementById('status-panel');
            const bar = document.getElementById('prog-bar');
            const val = document.getElementById('prog-val');
            
            statusPanel.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            consoleBox.innerHTML = "> STARTING ENGINE...<br>";

            // Date Calculation
            const range = document.getElementById('date_range').value;
            let f = new Date(); let t = new Date();
            if(range === 'custom') {
                f = new Date(document.getElementById('start_date').value);
                t = new Date(document.getElementById('end_date').value);
            } else if (range === 'ytd') f = new Date(new Date().getFullYear(), 0, 1);
            else f.setDate(f.getDate() - parseInt(range));

            try {
                const response = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        pulsar_token: document.getElementById('p_token').value,
                        search_id: document.getElementById('s_id').value,
                        from: f.toISOString(),
                        to: t.toISOString()
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            const d = JSON.parse(line.replace('data: ', ''));
                            
                            if (d.status === 'active' || d.status === 'log' || d.status === 'ingesting') {
                                if (d.log) consoleBox.innerHTML += `> ${d.log}<br>`;
                                if (d.progress) {
                                    bar.style.width = d.progress + '%';
                                    val.innerText = d.progress + '%';
                                }
                                consoleBox.scrollTop = consoleBox.scrollHeight;
                            } else if (d.status === 'error') {
                                consoleBox.innerHTML += `<span class="text-red-500">> ERROR: ${d.log}</span><br>`;
                            } else if (d.status === 'complete') {
                                consoleBox.innerHTML += `<span class="text-white">> SUCCESS: ${d.total} POSTS INDEXED.</span><br>`;
                                document.getElementById('chat-section').classList.remove('hidden');
                                setTimeout(() => document.getElementById('chat-section').classList.add('opacity-100'), 100);
                            }
                        }
                    });
                }
            } catch (e) {
                consoleBox.innerHTML += `<span class="text-red-500">> CRITICAL FAILURE: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GEMINI | Strategic Ingestion Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        body { background: #030303; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card { background: #0a0a0c; border: 1px solid #1a1a1c; border-radius: 1rem; }
        .input-field { background: #000; border: 1px solid #262626; color: #fff; transition: all 0.2s; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        .terminal { font-family: 'JetBrains Mono', monospace; color: #10b981; font-size: 11px; }
    </style>
</head>
<body class="p-6 lg:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 border-b border-gray-900 pb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-black italic uppercase text-white tracking-tighter">Synthesis<span class="text-blue-500">.Alpha</span></h1>
                <p class="text-[10px] text-gray-500 tracking-[0.3em] mt-1 uppercase">Pulsar TRAC v2 Priority Ingest</p>
            </div>
            <div id="status-badge" class="px-4 py-1 border border-gray-800 text-[10px] font-bold text-gray-400 uppercase bg-black rounded-full">Idle</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="card p-6">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4">Auth & Target</h2>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="input-field w-full p-3 rounded-lg text-xs mb-3">
                    <input id="g_key" type="password" placeholder="Groq API Key" class="input-field w-full p-3 rounded-lg text-xs mb-3">
                    <input id="s_id" type="text" placeholder="Search ID (Hex/Num)" class="input-field w-full p-3 rounded-lg text-xs">
                </div>
                <div class="card p-6">
                    <h2 class="text-[10px] font-black text-purple-500 uppercase tracking-widest mb-4">Timeline</h2>
                    <select id="date_range" onchange="checkCustom()" class="input-field w-full p-3 rounded-lg text-xs mb-3">
                        <option value="7" selected>Last 7 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="qtd">QTD</option>
                        <option value="ytd">YTD</option>
                        <option value="custom">Manual...</option>
                    </select>
                    <div id="custom_box" class="hidden grid grid-cols-2 gap-2">
                        <input type="date" id="start_date" class="input-field p-2 rounded-lg text-[10px]">
                        <input type="date" id="end_date" class="input-field p-2 rounded-lg text-[10px]">
                    </div>
                </div>
                <button onclick="runIngest()" id="btn-main" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all active:scale-95">INGEST DATA</button>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="card bg-black h-40 p-5 terminal overflow-y-auto border-gray-800" id="console">
                    <span class="text-gray-700">// Awaiting System Start...</span>
                </div>
                <div id="chat-ui" class="hidden space-y-6">
                    <div id="history" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
                    <div class="relative flex items-center">
                        <input id="query" type="text" placeholder="Query the posts and articles..." class="w-full bg-[#0a0a0c] border border-gray-800 p-5 rounded-2xl text-white outline-none">
                        <button onclick="ask()" class="absolute right-3 bg-blue-600 px-6 py-2 rounded-xl text-white font-bold text-xs">ASK</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkCustom() { document.getElementById('custom_box').classList.toggle('hidden', document.getElementById('date_range').value !== 'custom'); }
        function calculateDates() {
            const range = document.getElementById('date_range').value;
            let f = new Date(); let t = new Date();
            if (range === 'custom') { f = new Date(document.getElementById('start_date').value); t = new Date(document.getElementById('end_date').value); }
            else if (range === 'ytd') f = new Date(new Date().getFullYear(), 0, 1);
            else if (range === 'qtd') f = new Date(new Date().getFullYear(), Math.floor(new Date().getMonth() / 3) * 3, 1);
            else f.setDate(f.getDate() - parseInt(range));
            const iso = (d) => d.toISOString().split('.')[0] + "Z";
            return { from: iso(f), to: iso(t) };
        }
        async function runIngest() {
            const btn = document.getElementById('btn-main');
            const con = document.getElementById('console');
            const status = document.getElementById('status-badge');
            btn.disabled = true; status.innerText = "Syncing...";
            con.innerHTML = `<div class="text-gray-500">>> HANDSHAKE_START: ${new Date().toLocaleTimeString()}</div>`;
            try {
                const res = await fetch('/api/ingest', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pulsar_token: document.getElementById('p_token').value, search_id: document.getElementById('s_id').value, ...calculateDates() })
                });
                const data = await res.json();
                if(data.status === "success") {
                    // TEXT UPDATE HERE
                    con.innerHTML += `<div class="text-emerald-400">>> SUCCESS: ${data.count} posts/articles captured.</div>`;
                    document.getElementById('chat-ui').classList.remove('hidden');
                    status.innerText = "Online";
                } else { con.innerHTML += `<div class="text-red-500">>> ERROR: ${data.error || data.message}</div>`; }
            } catch (e) { con.innerHTML += `<div class="text-red-600">>> FAIL: ${e.message}</div>`; }
            finally { btn.disabled = false; }
        }
        async function ask() {
            const q = document.getElementById('query').value;
            const hist = document.getElementById('history');
            if(!q) return;
            hist.innerHTML += `<div class="text-right"><span class="bg-blue-900/20 p-3 rounded-lg border border-blue-900/30 text-sm inline-block text-blue-100">${q}</span></div>`;
            document.getElementById('query').value = "";
            hist.scrollTop = hist.scrollHeight;

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ search_id: document.getElementById('s_id').value, groq_key: document.getElementById('g_key').value, question: q })
                });
                
                const data = await res.json();
                if (data.error) {
                    hist.innerHTML += `<div class="text-left"><div class="bg-red-900/20 p-4 rounded-lg border border-red-500/50 text-xs text-red-400 font-mono">LLM_ERROR: ${data.error}</div></div>`;
                } else {
                    hist.innerHTML += `<div class="text-left"><div class="bg-white/5 p-4 rounded-lg border border-white/10 text-sm text-gray-300 leading-relaxed font-light prose prose-invert">${data.answer.replace(/\n/g, '<br>')}</div></div>`;
                }
            } catch (e) {
                hist.innerHTML += `<div class="text-left"><div class="bg-red-900/20 p-4 rounded-lg border border-red-500/50 text-xs text-red-400 font-mono">CRITICAL_FAIL: ${e.message}</div></div>`;
            }
            hist.scrollTop = hist.scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sjölyst Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1a1a1a; }
        .ikea-blue { background-color: #0058a3; }
        .ikea-text { color: #0058a3; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-16 border-b border-gray-100 pb-8">
            <h1 class="text-2xl font-black tracking-tighter ikea-text italic uppercase">Sjölyst <span class="text-gray-300 font-normal not-italic">Pro</span></h1>
            <div id="status" class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">Strategic Engine v3.1</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <aside class="lg:col-span-1 space-y-10">
                <section class="space-y-4">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Setup</h3>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full p-3 border border-gray-200 rounded-none text-sm outline-none focus:border-blue-500">
                    <input id="g_key" type="password" placeholder="Groq Key" class="w-full p-3 border border-gray-200 rounded-none text-sm outline-none">
                    <input id="s_id" type="text" placeholder="Search ID" class="w-full p-3 border border-gray-200 rounded-none text-sm outline-none">
                </section>

                <section class="space-y-4">
                    <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Timeframe</h3>
                    <select id="date_preset" onchange="toggleDate()" class="w-full p-3 border border-gray-200 rounded-none text-sm outline-none bg-white">
                        <option value="7" selected>Last 7 Days</option>
                        <option value="14">Last 14 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="custom">Custom Range...</option>
                    </select>
                    <div id="custom_ui" class="hidden space-y-2">
                        <input id="date_from" type="date" class="w-full p-2 border border-gray-200 text-xs">
                        <input id="date_to" type="date" class="w-full p-2 border border-gray-200 text-xs">
                    </div>
                </section>

                <button onclick="run()" id="btn" class="w-full py-5 ikea-blue text-white font-bold text-xs tracking-widest hover:opacity-90 transition-all">ANALYZE NOW</button>
            </aside>

            <main class="lg:col-span-3">
                <div class="mb-10">
                    <textarea id="prompt" rows="2" class="w-full text-3xl font-light border-none focus:ring-0 outline-none placeholder-gray-200 leading-tight" placeholder="State your analysis goal..."></textarea>
                </div>

                <div id="prog_wrap" class="hidden mb-12">
                    <div class="flex justify-between text-[10px] font-bold ikea-text uppercase mb-2">
                        <span id="prog_msg">Initializing</span>
                        <span id="prog_val">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 h-[2px]"><div id="prog_bar" class="ikea-blue h-[2px] transition-all duration-700" style="width:0%"></div></div>
                </div>

                <div id="output" class="hidden space-y-12">
                    <div class="border-l-4 border-blue-600 pl-8 py-2">
                        <h4 class="text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest">Executive Summary</h4>
                        <p id="sum-text" class="text-xl text-gray-700 font-light leading-relaxed"></p>
                    </div>
                    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Session Persistence
        const store = ['p_token', 'g_key', 's_id'];
        store.forEach(id => {
            const val = sessionStorage.getItem(id);
            if(val) document.getElementById(id).value = val;
            document.getElementById(id).addEventListener('input', e => sessionStorage.setItem(id, e.target.value));
        });

        function toggleDate() { document.getElementById('custom_ui').classList.toggle('hidden', document.getElementById('date_preset').value !== 'custom'); }

        async function updateProgress(val, msg) {
            document.getElementById('prog_bar').style.width = val + '%';
            document.getElementById('prog_val').innerText = val + '%';
            document.getElementById('prog_msg').innerText = msg;
        }

        async function run() {
            const btn = document.getElementById('btn');
            const wrap = document.getElementById('prog_wrap');
            const grid = document.getElementById('grid');
            const out = document.getElementById('output');
            
            btn.disabled = true;
            wrap.classList.remove('hidden');
            out.classList.add('hidden');
            grid.innerHTML = "";

            await updateProgress(20, "Accessing Pulsar API");

            // Calculate Dates
            const preset = document.getElementById('date_preset').value;
            let f = new Date(); let t = new Date();
            if(preset !== 'custom') f.setDate(f.getDate() - parseInt(preset));
            else { f = new Date(document.getElementById('date_from').value); t = new Date(document.getElementById('date_to').value); }

            const payload = {
                pulsar_token: document.getElementById('p_token').value,
                groq_key: document.getElementById('g_key').value,
                search_id: document.getElementById('s_id').value,
                date_from: f.toISOString().split('T')[0],
                date_to: t.toISOString().split('T')[0],
                prompt: document.getElementById('prompt').value || "Strategic Overview"
            };

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                await updateProgress(60, "Processing Narrative & Impact");
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                await updateProgress(90, "Finalizing Reports");
                document.getElementById('sum-text').innerText = data.summary;
                
                data.categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = "bg-white border border-gray-100 p-8 shadow-sm hover:shadow-md transition-shadow";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6">
                            <h5 class="font-black text-sm uppercase tracking-tighter">${cat.name}</h5>
                            <span class="text-[9px] font-bold ikea-text bg-blue-50 px-2 py-1 border border-blue-100 uppercase italic">Impact: ${cat.impact}</span>
                        </div>
                        <div class="flex gap-4 text-[10px] font-bold text-gray-400 uppercase mb-6 tracking-widest">
                            <span>${cat.sentiment}</span><span>•</span><span>${cat.emotion}</span><span>•</span><span>${cat.count} Mentions</span>
                        </div>
                        <code class="block text-[10px] bg-gray-50 p-4 text-gray-400 mb-6 truncate font-mono">${cat.boolean}</code>
                        <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                            <a href="${cat.url}" target="_blank" class="text-[10px] font-bold ikea-text underline hover:text-blue-800">VIEW EVIDENCE</a>
                            <button onclick="navigator.clipboard.writeText('${cat.boolean}')" class="text-[10px] font-bold text-gray-300 hover:text-blue-600 uppercase">Copy Boolean</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                await updateProgress(100, "Complete");
                setTimeout(() => { wrap.classList.add('hidden'); out.classList.remove('hidden'); }, 800);
            } catch (e) {
                alert(e.message);
                wrap.classList.add('hidden');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

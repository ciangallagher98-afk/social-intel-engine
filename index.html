<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 font-sans">
    <div class="max-w-5xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6 bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Auth</label>
                    <input id="p_token" type="password" placeholder="Pulsar Token" class="w-full mb-2 p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-blue-500 outline-none">
                    <input id="g_key" type="password" placeholder="Groq Key" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Search</label>
                    <input id="s_id" type="text" placeholder="Search ID" class="w-full mb-4 p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none">
                    <select id="date_preset" onchange="toggleDateVisibility()" class="w-full mb-3 p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none text-slate-300">
                        <option value="7">Last 7 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="custom">Custom...</option>
                    </select>
                    <div id="custom_date_container" class="hidden flex gap-2"><input id="date_from" type="date" class="w-1/2 p-2 rounded bg-slate-900 text-xs"><input id="date_to" type="date" class="w-1/2 p-2 rounded bg-slate-900 text-xs"></div>
                </div>
                <button onclick="run()" id="btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all">🚀 ANALYZE</button>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <textarea id="prompt" rows="2" class="w-full bg-transparent text-xl text-center focus:outline-none placeholder-slate-600 italic" placeholder="e.g. Identify top pain points..."></textarea>
                </div>

                <div id="output" class="hidden space-y-6">
                    <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
                
                <div id="loader" class="hidden text-center py-20 animate-pulse text-slate-500 uppercase text-xs tracking-widest">Calculating Impact & Evidence...</div>
            </div>
        </div>
    </div>

    <script>
        function toggleDateVisibility() { document.getElementById('custom_date_container').classList.toggle('hidden', document.getElementById('date_preset').value !== 'custom'); }

        async function run() {
            const grid = document.getElementById('category-grid');
            const loader = document.getElementById('loader');
            const out = document.getElementById('output');
            
            loader.classList.remove('hidden');
            out.classList.add('hidden');
            grid.innerHTML = "";

            const payload = {
                pulsar_token: document.getElementById('p_token').value,
                groq_key: document.getElementById('g_key').value,
                search_id: document.getElementById('s_id').value,
                date_from: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // Simplified date logic for demo
                date_to: new Date().toISOString().split('T')[0],
                prompt: document.getElementById('prompt').value || "Analyze themes"
            };

            try {
                const res = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();

                data.categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800 p-5 rounded-2xl border border-slate-700 flex flex-col justify-between";
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-blue-400">${cat.name}</span>
                                <span class="text-[10px] px-2 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Impact: ${cat.impact_score}</span>
                            </div>
                            <p class="text-[10px] text-slate-500 mb-3 uppercase font-bold tracking-tighter">${cat.count} Mentions</p>
                            <code class="block text-[9px] bg-slate-900 p-2 rounded mb-4 text-slate-400 break-all border border-slate-700">${cat.boolean}</code>
                        </div>
                        <div class="pt-4 border-t border-slate-700 flex justify-between items-center">
                            <a href="${cat.evidence}" target="_blank" class="text-[10px] text-blue-400 hover:underline">🔗 View Evidence Post</a>
                            <button onclick="navigator.clipboard.writeText('${cat.boolean}')" class="text-[9px] bg-slate-700 px-2 py-1 rounded hover:bg-slate-600 transition-colors">Copy Boolean</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                out.classList.remove('hidden');
            } catch (e) { alert("Error: " + e.message); } finally { loader.classList.add('hidden'); }
        }
    </script>
</body>
</html>
